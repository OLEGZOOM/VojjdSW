name: Deploy to GitHub Pages

# Запускать действие при каждом пуше в ветку main
on:
  push:
    branches: ["main"]

# Разрешить GitHub Actions изменять содержимое репозитория
permissions:
  contents: read
  pages: write
  id-token: write

# Обеспечить, чтобы одновременно запускался только один деплой
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Этот шаг подставляет значения из GitHub Secrets в наш файл
      - name: Replace tokens in HTML
        run: |
          sed -i 's/{{ secrets.BOT_TOKEN }}/${{ secrets.BOT_TOKEN }}/g' index.html
          sed -i 's/{{ secrets.CHAT_ID }}/${{ secrets.CHAT_ID }}/g' index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
